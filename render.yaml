services:
  # ─────────────────────────────────────────
  # Backend Service
  # ─────────────────────────────────────────
  - type: web
    name: be-todo
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DB_HOST
        value: your-render-db-host # Replace with your Render PostgreSQL host
      - key: DB_USER
        value: your-render-db-user # Replace with your Render PostgreSQL user
      - key: DB_PASSWORD
        value: your-render-db-password # Replace with your Render PostgreSQL password
      - key: DB_NAME
        value: your-render-db-name # Replace with your Render PostgreSQL database name
      - key: PORT
        value: 5000

  # ─────────────────────────────────────────
  # Frontend Service
  # ─────────────────────────────────────────
  - type: web
    name: fe-todo
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: REACT_APP_API_URL
        value: https://be-todo.onrender.com # Must match the backend service name above

  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
databases:
  - name: todo-db
    databaseName: todo
    user: todo_user
